<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Road Maintenance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>

@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

/* ========================================================== */
/* DESIGN TOKENS                                              */
/* ========================================================== */
:root {
  --navy-950:  #040d1a;
  --navy-900:  #071428;
  --teal-500:  #00d4b8;
  --teal-400:  #22e8d0;
  --teal-300:  #5ff0de;
  --gold-500:  #f0a832;
  --gold-400:  #f7bf60;
  --gold-300:  #fdd98e;
  --rose-500:  #f05e6a;

  --glass-deep:         rgba(4, 16, 38, 0.72);
  --border-bright:      rgba(0, 212, 184, 0.30);
  --border-soft:        rgba(0, 212, 184, 0.12);
  --shadow-deep:        0 32px 72px rgba(0, 0, 0, 0.65);
  --shadow-card:        0 8px 40px rgba(0, 0, 0, 0.45), 0 1px 0 rgba(255,255,255,0.05) inset;

  --text-primary:       #e8f0fe;
  --text-muted:         #546a8a;

  --input-bg:           rgba(3, 10, 26, 0.80);
  --input-border:       rgba(0, 212, 184, 0.18);
  --input-focus-border: rgba(0, 212, 184, 0.60);
  --input-focus-glow:   0 0 0 3px rgba(0,212,184,0.12), 0 0 20px rgba(0,212,184,0.08);

  --font-display: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;

  --ease-glass:  cubic-bezier(0.23, 1, 0.32, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --t-fast: 140ms;
  --t-base: 260ms;

  --radius-md:   0.625rem;
  --radius-lg:   0.875rem;
  --radius-3xl:  2.5rem;
  --radius-full: 9999px;
}

/* ========================================================== */
/* RESET & BASE                                               */
/* ========================================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy-950);
  overflow: hidden;
  position: relative;
}

/* ── Ambient Background ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15% -5%,   rgba(0,212,184,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 88% 25%,   rgba(240,168,50,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 80% 60% at 50% 110%,  rgba(16,48,100,0.55)  0%, transparent 60%),
    linear-gradient(155deg, #040d1a 0%, #071428 45%, #0c1e40 100%);
  pointer-events: none;
}

/* ── Mesh Grid ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,212,184,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,184,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 30%, transparent 80%);
  mask-image:         radial-gradient(ellipse 90% 90% at 50% 50%, black 30%, transparent 80%);
  pointer-events: none;
}

/* ========================================================== */
/* FLOATING ORBS                                              */
/* ========================================================== */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(70px); pointer-events: none; z-index: 0;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb1 { width: 380px; height: 380px; top: -100px; left: -80px;   background: radial-gradient(circle, rgba(0,212,184,0.12), transparent 70%); }
.orb2 { width: 300px; height: 300px; bottom: -80px; right: -60px; background: radial-gradient(circle, rgba(240,168,50,0.10), transparent 70%); animation-delay: -5s; }
.orb3 { width: 220px; height: 220px; top: 40%; left: 60%;         background: radial-gradient(circle, rgba(0,130,180,0.08), transparent 70%); animation-delay: -9s; }

/* ========================================================== */
/* ANIMATIONS                                                 */
/* ========================================================== */
@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(20px,-30px) scale(1.05); }
  66%      { transform: translate(-15px,20px) scale(0.96); }
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(32px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes glowPulse {
  0%,100% { opacity: 0.7; }
  50%      { opacity: 1; }
}
@keyframes ringPulse {
  0%,100% { transform: scale(1);    opacity: 0.6; }
  50%      { transform: scale(1.05); opacity: 1; }
}
@keyframes iconFloat {
  0%,100% { transform: translateY(0);    box-shadow: 0 0 35px rgba(0,212,184,0.25), 0 8px 24px rgba(0,0,0,0.45); }
  50%      { transform: translateY(-7px); box-shadow: 0 0 50px rgba(0,212,184,0.38), 0 18px 36px rgba(0,0,0,0.45); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-5px); }
  80%      { transform: translateX(5px); }
}

/* ========================================================== */
/* LOGIN WRAPPER                                              */
/* ========================================================== */
.login-wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 430px;
  padding: 1rem;
  animation: cardIn 0.75s var(--ease-glass) both;
}

/* ========================================================== */
/* LOGIN CARD                                                 */
/* ========================================================== */
.login-card {
  background: var(--glass-deep);
  backdrop-filter: blur(28px) saturate(1.7);
  -webkit-backdrop-filter: blur(28px) saturate(1.7);
  border-radius: var(--radius-3xl);
  border: 1px solid var(--border-bright);
  box-shadow: var(--shadow-deep), 0 0 60px rgba(0,212,184,0.12);
  overflow: hidden;
  position: relative;
}

.login-card::before {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(135deg, rgba(0,212,184,0.05) 0%, transparent 45%, rgba(240,168,50,0.03) 100%);
  pointer-events: none; z-index: 0;
}

/* ========================================================== */
/* CARD HEADER                                                */
/* ========================================================== */
.card-header {
  padding: 2.5rem 2.5rem 2rem;
  text-align: center;
  position: relative; z-index: 1;
  border-bottom: 1px solid var(--border-soft);
}

.card-header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--teal-500) 30%, var(--gold-400) 70%, transparent 100%);
  animation: glowPulse 3s ease-in-out infinite;
}

/* ── Admin Icon ── */
.admin-icon {
  width: 82px; height: 82px;
  margin: 0 auto 1.5rem;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}

.admin-icon .ring-outer {
  position: absolute; inset: -10px; border-radius: 50%;
  border: 1px solid rgba(0,212,184,0.15);
  animation: ringPulse 3s ease-in-out infinite;
  animation-delay: 0.4s;
}

.admin-icon .ring-inner {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1.5px solid rgba(0,212,184,0.38);
  animation: ringPulse 3s ease-in-out infinite;
}

.admin-icon .icon-circle {
  width: 78px; height: 78px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,212,184,0.20) 0%, rgba(0,100,100,0.12) 100%);
  border: 1px solid rgba(0,212,184,0.38);
  display: flex; align-items: center; justify-content: center;
  animation: iconFloat 4s ease-in-out infinite;
  position: relative; z-index: 1;
  box-shadow: 0 0 35px rgba(0,212,184,0.25), 0 8px 24px rgba(0,0,0,0.45);
}

.admin-icon .icon-circle i {
  font-size: 2.1rem;
  color: var(--teal-400);
  filter: drop-shadow(0 0 10px rgba(0,212,184,0.65));
}

.admin-icon .crown-badge {
  position: absolute; top: 0; right: 2px; z-index: 2;
  width: 24px; height: 24px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
  border: 2px solid var(--navy-950);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 12px rgba(240,168,50,0.55);
}

.admin-icon .crown-badge i { font-size: 0.6rem; color: var(--navy-950); }

.card-header h1 {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 800; letter-spacing: -0.4px;
  margin-bottom: 0.45rem;
  background: linear-gradient(90deg, var(--teal-300) 0%, var(--text-primary) 40%, var(--gold-300) 80%, var(--text-primary) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 6s linear infinite;
}

.card-header p {
  font-size: 0.85rem; font-weight: 300;
  color: var(--text-muted); letter-spacing: 0.2px;
}

/* ========================================================== */
/* CARD BODY                                                  */
/* ========================================================== */
.card-body { padding: 2rem 2.5rem 2.5rem; position: relative; z-index: 1; }

/* ========================================================== */
/* FORM GROUP                                                 */
/* ========================================================== */
.form-group { margin-bottom: 1.4rem; }

.form-group label {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--font-display);
  font-size: 0.68rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.3px;
  color: var(--teal-400);
  margin-bottom: 0.55rem;
}

.form-group label i { font-size: 0.68rem; opacity: 0.85; }

/* ========================================================== */
/* INPUT                                                      */
/* ========================================================== */
input[type="password"],
input[type="text"] {
  width: 100%;
  padding: 0.9rem 1.1rem;
  background: var(--input-bg);
  border: 1px solid var(--input-border);
  border-radius: var(--radius-lg);
  font-size: 0.95rem; font-family: var(--font-body);
  color: var(--text-primary);
  transition: border-color var(--t-base) var(--ease-glass),
              box-shadow    var(--t-base) var(--ease-glass),
              background    var(--t-base) var(--ease-glass);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

input::placeholder { color: var(--text-muted); font-weight: 300; }

input:hover {
  border-color: rgba(0,212,184,0.38);
  background: rgba(3,10,26,0.90);
}

input:focus {
  outline: none;
  border-color: var(--input-focus-border);
  box-shadow: var(--input-focus-glow);
  background: rgba(3,10,26,0.95);
}

/* ========================================================== */
/* ERROR MESSAGE                                              */
/* ========================================================== */
.error-message {
  display: none;
  background: rgba(240,94,106,0.12);
  border: 1px solid rgba(240,94,106,0.28);
  border-radius: var(--radius-md);
  padding: 0.6rem 1rem;
  font-size: 0.8rem; color: var(--rose-500);
  margin-bottom: 1rem;
  gap: 8px; align-items: center;
  animation: fadeUp 0.25s var(--ease-glass);
}

.error-message i { font-size: 0.85rem; }

/* ========================================================== */
/* BUTTON                                                     */
/* ========================================================== */
button {
  width: 100%; padding: 0.95rem;
  background: linear-gradient(135deg, var(--teal-500) 0%, #00a8b8 100%);
  color: var(--navy-950);
  border: none; border-radius: var(--radius-lg);
  font-family: var(--font-display);
  font-size: 0.9rem; font-weight: 700; letter-spacing: 0.6px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all var(--t-base) var(--ease-spring);
  box-shadow: 0 8px 28px -6px rgba(0,212,184,0.45);
  margin-top: 0.4rem;
}

button::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 65%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  transition: left 0.55s ease;
}

button:hover::before { left: 140%; }

button::after {
  content: '';
  position: absolute; bottom: 0; left: 20%; right: 20%; height: 1px;
  background: rgba(255,255,255,0.38);
  border-radius: var(--radius-full);
}

button:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 16px 36px -6px rgba(0,212,184,0.55), 0 0 25px rgba(0,212,184,0.22);
}

button:active { transform: translateY(0) scale(0.99); }
button i      { margin-right: 8px; }

/* ========================================================== */
/* DEMO INFO                                                  */
/* ========================================================== */
.demo-info {
  margin-top: 1.2rem;
  background: rgba(0,212,184,0.06);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius-md);
  padding: 0.7rem 1rem;
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8rem; color: var(--text-muted);
}

.demo-info i      { color: var(--teal-400); font-size: 0.8rem; flex-shrink: 0; }
.demo-info strong { color: var(--teal-400); font-weight: 600; }

/* ========================================================== */
/* SCROLLBAR & SELECTION                                      */
/* ========================================================== */
::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-track { background: var(--navy-900); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--teal-500), var(--gold-400));
  border-radius: var(--radius-full);
}

::selection { background: rgba(0,212,184,0.25); color: var(--text-primary); }

/* ========================================================== */
/* RESPONSIVE                                                 */
/* ========================================================== */
@media (max-width: 480px) {
  .login-wrapper  { padding: 0.75rem; }
  .card-header    { padding: 2rem 1.5rem 1.5rem; }
  .card-body      { padding: 1.5rem 1.5rem 2rem; }
  .card-header h1 { font-size: 1.5rem; }
}

    </style>
</head>
<body>

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="card-header">
                <div class="admin-icon">
                    <div class="ring-outer"></div>
                    <div class="ring-inner"></div>
                    <div class="icon-circle">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="crown-badge">
                        <i class="fas fa-crown"></i>
                    </div>
                </div>
                <h1>Admin Login</h1>
                <p>Enter password to access dashboard</p>
            </div>

            <div class="card-body">

                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Invalid password. Please try again.</span>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Admin Password
                    </label>
                    <input type="password" id="password" placeholder="Enter admin password" autocomplete="off">
                </div>

                <button onclick="checkPassword()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="demo-info">
                    <i class="fas fa-info-circle"></i>
                    <strong>Demo Password:</strong>&nbsp;admin123
                </div>

            </div>
        </div>
    </div>

    <script>
        // Set your admin password here
        const ADMIN_PASSWORD = "admin123";
        
        function checkPassword() {
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');
            const password = passwordInput.value;
            
            if (password === ADMIN_PASSWORD) {
                // Correct password - redirect to admin dashboard
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                // Wrong password - show error
                errorMessage.style.display = 'flex';
                passwordInput.value = '';
                passwordInput.focus();
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        }
        
        // Press Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
        
        // If already logged in, redirect to dashboard
        if (localStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>

</body>
</html>
