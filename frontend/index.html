<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Maintenance Complaint Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="fas fa-road"></i>
                Road Maintenance Complaint Portal
            </h1>
            <p>Report road issues and help improve infrastructure</p>
        </header>
        
        <div class="form-container">
            <div class="landing-buttons">
                <a href="citizen-report.html">
                    <button>
                        <i class="fas fa-exclamation-triangle"></i>
                        Report an Issue
                    </button>
                </a>
                <a href="admin-login.html">
                    <button style="background: linear-gradient(135deg, #6b7280, #4b5563);">
                        <i class="fas fa-chart-line"></i>
                        Admin Login
                    </button>
                </a>
            </div>
        </div>
    </div>
    
    <script src="js/theme.js"></script>
</body>
</html>
